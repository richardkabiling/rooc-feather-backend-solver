name: CI

on:
  push:
    branches: ["main"]

jobs:
  # ── 1. Validate ────────────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: validate-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: validate-cargo-

      - name: Build & test
        run: cargo build --release && cargo test

  # ── 2. Tag ─────────────────────────────────────────────────────────────────
  tag:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: bump
        run: |
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)

          if [[ -z "$LATEST" ]]; then
            COMMITS=$(git log HEAD --format="%s %b")
            LATEST="v0.0.0"
          else
            COMMITS=$(git log "${LATEST}..HEAD" --format="%s %b")
          fi

          BUMP="patch"
          if echo "$COMMITS" | grep -qE '(BREAKING CHANGE|[a-z]+!:)'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qP '(?m)^feat[^!]*:'; then
            BUMP="minor"
          fi

          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          if [[ "$BUMP" == "major" ]]; then
            NEW_TAG="v$((MAJOR + 1)).0.0"
          elif [[ "$BUMP" == "minor" ]]; then
            NEW_TAG="v${MAJOR}.$((MINOR + 1)).0"
          else
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Bumped $BUMP: $LATEST → $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

  # ── 3. Release build (matrix) ──────────────────────────────────────────────
  build:
    needs: tag
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rooc-feather-solver-linux-x86_64
            binary: rooc-feather-solver
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: rooc-feather-solver-macos-x86_64
            binary: rooc-feather-solver
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rooc-feather-solver-macos-arm64
            binary: rooc-feather-solver
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: rooc-feather-solver-windows-x86_64
            binary: rooc-feather-solver.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.new_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          dst="${{ matrix.artifact }}"
          [[ "${{ matrix.binary }}" == *.exe ]] && dst="${dst}.exe"
          cp "$src" "$dst"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}*

  # ── 4. GitHub Release ──────────────────────────────────────────────────────
  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          files: artifacts/*
          generate_release_notes: true

      - name: Update README download link
        run: |
          TAG="${{ needs.tag.outputs.new_tag }}"
          REPO="${GITHUB_REPOSITORY}"
          sed -i "s|\[latest release\](.*)|[latest release](https://github.com/${REPO}/releases/tag/${TAG})|g" README.md
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: update release link to ${TAG} [skip ci]"
          git push origin HEAD:main
